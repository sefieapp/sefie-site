<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sefie – Find Your Best Photo</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: #FFF6FA;
  color: #111;
}

/* 透過SNSバー */
.topbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 12px 16px;
  display: flex;
  justify-content: flex-end;
  z-index: 1000;
  background: transparent;
}

.topbar a {
  margin-left: 12px;
  font-size: 18px;
  text-decoration: none;
}

/* メイン */
.container {
  max-width: 640px;
  margin: auto;
  padding: 80px 20px 40px;
  text-align: center;
}

/* タイトル */
h1 {
  font-size: 26px;
  margin-bottom: 6px;
}

.appname {
  font-weight: bold;
  font-size: 14px;
  color: #FF6FAE;
  letter-spacing: 1px;
}

/* テキスト */
p {
  color: #666;
  margin-bottom: 10px;
}

/* 画像 */
.img {
  width: 100%;
  border-radius: 18px;
  margin: 20px 0;
}

/* ストアボタン（横並び） */
.store-buttons {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin: 20px 0;
}

.store-buttons a img {
  height: 52px;
}

/* セクション */
.section {
  margin-top: 40px;
}

/* フッター */
.footer {
  margin-top: 60px;
  padding-bottom: 40px;
  text-align: center;
}

.footer .store-buttons {
  margin-bottom: 12px;
}

.footer a {
  margin: 0 6px;
  font-size: 13px;
  color: #888;
  text-decoration: none;
}
</style>
</head>

<body>

<!-- SNS固定（透過） -->
<div class="topbar">
  <a href="https://www.tiktok.com/@sefie.app/" target="_blank">🎵</a>
  <a href="https://www.instagram.com/sefie.app/" target="_blank">📷</a>
  <a href="https://www.youtube.com/@sefieapp" target="_blank">▶️</a>
  <a href="https://x.com/sefieapp" target="_blank">𝕏</a>
</div>

<div class="container">

  <!-- アプリ名 -->
  <div class="appname">SEFIE</div>
  <h1>Choose Your “Today’s Best”</h1>
  <p>Let AI pick your best photo instantly</p>

  <!-- メイン画像 -->
  <img src="main.jpg" class="img">

  <!-- ストアボタン -->
  <div class="store-buttons">
    <a href="https://apps.apple.com">
      <img src="appstore.png">
    </a>
    <a href="https://play.google.com">
      <img src="googleplay.png">
    </a>
  </div>

  <!-- スコア -->
  <div class="section">
    <img src="score.jpg" class="img">
    <p>Face. Style. Vibe. All scored instantly.</p>
  </div>

  <!-- ランキング -->
  <div class="section">
    <img src="rank.jpg" class="img">
    <p>Find your best shot with AI ranking</p>
  </div>

  <!-- 雰囲気 -->
  <div class="section">
    <img src="visual.jpg" class="img">
    <p>Feel confident in every photo</p>
  </div>

</div>

<!-- フッター -->
<div class="footer">

  <div class="store-buttons">
    <a href="https://apps.apple.com">
      <img src="appstore.png">
    </a>
    <a href="https://play.google.com">
      <img src="googleplay.png">
    </a>
  </div>

  <div>
    <a href="/privacy.html">Privacy</a> |
    <a href="/terms.html">Terms</a> |
    <a href="/support.html">Support</a>
  </div>

</div>

</body>
</html>
