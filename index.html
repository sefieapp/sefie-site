<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sefie – Find Your Best Photo</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: #fff7fb;
    color: #111;
  }

  a {
    text-decoration: none;
  }

  /* fixed SNS */
  .topbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    padding: 10px 14px;
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    z-index: 1000;
    background: rgba(255, 247, 251, 0.28);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  .topbar a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    border-radius: 999px;
    background: rgba(255,255,255,0.72);
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    color: #ff5ea8;
    font-size: 16px;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 60px 16px 30px;
    text-align: center;
  }

  /* first view */
  .hero {
    padding-top: 6px;
  }

  .appname {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 1.6px;
    color: #ff5ea8;
    margin-bottom: 8px;
  }

  h1 {
    margin: 0;
    font-size: 28px;
    line-height: 1.16;
    letter-spacing: -0.02em;
  }

  .subcopy {
    margin: 10px auto 14px;
    max-width: 340px;
    font-size: 15px;
    line-height: 1.45;
    color: #666;
  }

  /* store buttons first, always above fold */
  .store-buttons {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: nowrap;
    margin: 0 0 14px;
  }

  .store-buttons a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .store-buttons img {
    display: block;
    height: 46px;
    width: auto;
    border-radius: 12px;
  }

  .hero-image-wrap {
    margin-top: 4px;
  }

  .img {
    width: 100%;
    display: block;
    border-radius: 18px;
    box-shadow: 0 10px 26px rgba(0,0,0,0.08);
  }

  .section {
    margin-top: 34px;
  }

  .section p {
    margin: 10px auto 0;
    max-width: 360px;
    color: #666;
    font-size: 15px;
    line-height: 1.45;
  }

  .footer {
    padding: 26px 16px 38px;
    text-align: center;
    background: transparent;
  }

  .footer .store-buttons {
    margin-bottom: 12px;
  }

  .footer-links {
    font-size: 13px;
    color: #888;
  }

  .footer-links a {
    color: #888;
    margin: 0 6px;
  }

  /* mobile tune */
  @media (max-width: 430px) {
    .container {
      padding-top: 56px;
      padding-left: 14px;
      padding-right: 14px;
    }

    .topbar {
      padding: 8px 10px;
      gap: 8px;
    }

    .topbar a {
      width: 32px;
      height: 32px;
      font-size: 15px;
    }

    h1 {
      font-size: 25px;
    }

    .subcopy {
      font-size: 14px;
      margin-bottom: 12px;
    }

    .store-buttons img {
      height: 44px;
    }

    .section {
      margin-top: 28px;
    }
  }
</style>
</head>

<body>

  <div class="topbar">
    <a href="https://www.tiktok.com/@sefie.app/" target="_blank" aria-label="TikTok">🎵</a>
    <a href="https://www.instagram.com/sefie.app/" target="_blank" aria-label="Instagram">📷</a>
    <a href="https://www.youtube.com/@sefieapp" target="_blank" aria-label="YouTube">▶</a>
    <a href="https://x.com/sefieapp" target="_blank" aria-label="X">𝕏</a>
  </div>

  <div class="container">

    <section class="hero">
      <div class="appname">SEFIE</div>
      <h1>Choose Your<br>“Today’s Best”</h1>
      <div class="subcopy">Let AI pick your best photo instantly.</div>

      <div class="store-buttons">
        <a href="https://apps.apple.com" target="_blank" aria-label="Download on the App Store">
          <img src="appstore.png" alt="Download on the App Store">
        </a>
        <a href="https://play.google.com" target="_blank" aria-label="Get it on Google Play">
          <img src="googleplay.png" alt="Get it on Google Play">
        </a>
      </div>

      <div class="hero-image-wrap">
        <img src="main.jpg" class="img" alt="Sefie main comparison">
      </div>
    </section>

    <section class="section">
      <img src="score.jpg" class="img" alt="Sefie scoring screen">
      <p>Face. Style. Vibe. All scored instantly.</p>
    </section>

    <section class="section">
      <img src="rank.jpg" class="img" alt="Sefie ranking screen">
      <p>Find your best shot with AI ranking.</p>
    </section>

    <section class="section">
      <img src="visual.jpg" class="img" alt="Sefie mood visual">
      <p>Feel confident in every photo.</p>
    </section>

  </div>

  <footer class="footer">
    <div class="store-buttons">
      <a href="https://apps.apple.com" target="_blank" aria-label="Download on the App Store">
        <img src="appstore.png" alt="Download on the App Store">
      </a>
      <a href="https://play.google.com" target="_blank" aria-label="Get it on Google Play">
        <img src="googleplay.png" alt="Get it on Google Play">
      </a>
    </div>

    <div class="footer-links">
      <a href="/privacy.html">Privacy</a> |
      <a href="/terms.html">Terms</a> |
      <a href="/support.html">Support</a>
    </div>
  </footer>

</body>
</html>
